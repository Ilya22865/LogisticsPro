<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#638ECB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Вход - LogisticsPro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Дополнительные стили для страницы входа */
        .auth-container {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 142, 203, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(224, 123, 83, 0.08) 0%, transparent 50%);
        }

        .auth-box {
            position: relative;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent-warm), var(--color-accent-green));
            border-radius: inherit;
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }

        .auth-box h1 {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .auth-box h1::before {
            content: '📦';
            font-size: 32px;
        }

        .auth-tabs {
            box-shadow: var(--shadow-soft);
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: var(--color-primary);
            font-size: 14px;
        }

        .form-group input {
            padding-left: 40px;
        }

        .form-group .input-icon {
            position: absolute;
            left: 14px;
            top: 42px;
            color: var(--color-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus + .input-icon,
        .form-group input:focus ~ label i {
            color: var(--color-accent-warm);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 42px;
            color: var(--color-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
            font-size: 16px;
            padding: 4px;
        }

        .password-toggle:hover {
            color: var(--color-accent-warm);
        }

        .form-footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .form-footer-links a {
            color: var(--color-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .form-footer-links a:hover {
            color: var(--color-accent-warm);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--color-primary);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-bg-secondary);
        }

        .divider span {
            padding: 0 15px;
        }

        .social-auth {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .social-btn {
            display: flex;
            width: 100%;
            max-width: 340px;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid var(--color-bg-secondary);
            border-radius: var(--border-radius);
            background: var(--color-white);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 20px;
            color: var(--color-dark);
        }

        .social-btn:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        .social-btn.google:hover {
            border-color: #DB4437;
            color: #DB4437;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 20px 15px;
                align-items: flex-start;
                padding-top: 40px;
            }

            .auth-box {
                padding: 30px 25px;
                max-width: 95%;
            }

            .auth-box::before {
                opacity: 0.2;
                filter: blur(8px);
            }

            .auth-tabs {
                flex-direction: row;
            }

            .auth-tabs button {
                padding: 12px 10px;
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-group input {
                padding: 14px 15px 14px 40px;
                font-size: 16px;
            }

            .form-group .input-icon {
                top: 44px;
                left: 14px;
            }

            .password-toggle {
                top: 44px;
                right: 14px;
                padding: 8px;
            }

            .btn-lg {
                padding: 16px;
                font-size: 16px;
                min-height: 52px;
            }

            .form-footer-links {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .social-auth {
                grid-template-columns: 1fr;
            }

            .social-btn {
                width: 100%;
                max-width: none;
            }

            .divider {
                margin: 20px 0;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 15px 10px;
                padding-top: 30px;
            }

            .auth-box {
                padding: 25px 20px;
                max-width: 100%;
            }

            .auth-box h1 {
                font-size: 24px;
            }

            .auth-box .subtitle {
                font-size: 13px;
            }

            .auth-tabs button {
                padding: 10px 8px;
                font-size: 13px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                padding: 12px 15px 12px 38px;
                font-size: 15px;
            }

            .form-group .input-icon {
                font-size: 15px;
                top: 42px;
            }

            .password-toggle {
                top: 42px;
                font-size: 15px;
            }

            .form-group .hint {
                font-size: 12px;
            }

            .btn-lg {
                padding: 14px;
                font-size: 15px;
            }

            .social-auth {
                grid-template-columns: 1fr;
            }

            .social-btn {
                padding: 14px;
                font-size: 18px;
            }

            .divider {
                font-size: 12px;
                margin: 15px 0;
            }

            .form-footer-links {
                font-size: 12px;
            }

            .form-footer-links a {
                font-size: 12px;
            }

            .auth-footer {
                font-size: 13px;
                margin-top: 15px;
            }
        }

        /* Адаптация для пейзажной ориентации */
        @media (max-height: 500px) and (orientation: landscape) {
            .auth-container {
                align-items: flex-start;
                padding-top: 20px;
            }

            .auth-box {
                max-width: 500px;
                padding: 20px;
            }

            .auth-tabs {
                margin-bottom: 15px;
            }

            .form-group {
                margin-bottom: 10px;
            }

            .divider, .social-auth {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>LogisticsPro</h1>
            <p class="subtitle">Система управления логистикой</p>

            <div class="auth-tabs">
                <button class="active" onclick="switchTab('login')"><i class="fas fa-sign-in-alt"></i> Вход</button>
                <button onclick="switchTab('register')"><i class="fas fa-user-plus"></i> Регистрация</button>
            </div>

            <!-- Форма входа -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-footer-links">
                    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                        <input type="checkbox" id="rememberMe" style="width: auto; margin: 0;">
                        <span style="font-size: 13px;">Запомнить меня</span>
                    </label>
                    <a href="#" onclick="alert('Функция восстановления пароля будет доступна в следующей версии'); return false;">
                        <i class="fas fa-key"></i> Забыли пароль?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="margin-top: 20px;">
                    <i class="fas fa-sign-in-alt"></i> Войти в систему
                </button>

                <div class="divider">
                    <span>или войти через</span>
                </div>

                <div class="social-auth">
                    <button type="button" class="social-btn google" onclick="alert('Google авторизация будет доступна позже')">
                        <i class="fab fa-google"></i>
                    </button>
                </div>

                <p class="auth-footer">
                    Нет аккаунта? <a href="#" onclick="switchTab('register'); return false;">Зарегистрироваться</a>
                </p>
            </form>

            <!-- Форма регистрации -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="registerName"><i class="fas fa-user"></i> ФИО</label>
                    <input type="text" id="registerName" placeholder="Иванов Иван Иванович" required>
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="registerEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="registerCompany"><i class="fas fa-building"></i> Название компании</label>
                    <input type="text" id="registerCompany" placeholder="ООО «Ромашка»" required>
                    <i class="fas fa-building input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="registerType"><i class="fas fa-briefcase"></i> Тип регистрации</label>
                    <select id="registerType" onchange="toggleStaffCodeField()" required>
                        <option value="customer">Клиент (заказчик)</option>
                        <option value="staff">Сотрудник логистической компании</option>
                    </select>
                </div>

                <div class="form-group" id="staffCodeGroup" style="display: none;">
                    <label for="staffCode"><i class="fas fa-id-badge"></i> Код сотрудника</label>
                    <input type="text" id="staffCode" placeholder="Введите код, выданный компанией">
                    <i class="fas fa-id-badge input-icon"></i>
                    <small class="hint">Код выдается вашим руководителем</small>
                </div>

                <div class="form-group">
                    <label for="registerPassword"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required minlength="6">
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                    <small class="hint">Минимум 8 символов</small>
                </div>

                <div class="form-group">
                    <label for="registerPasswordConfirm"><i class="fas fa-lock"></i> Подтверждение пароля</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="••••••••" required minlength="6">
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPasswordConfirm', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-footer-links">
                    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                        <input type="checkbox" id="agreeTerms" required style="width: auto; margin: 0;">
                        <span style="font-size: 13px;">Согласен с <a href="#" onclick="alert('Условия использования будут доступны позже'); return false;">условиями использования</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="margin-top: 20px;">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>

                <p class="auth-footer">
                    Уже есть аккаунт? <a href="#" onclick="switchTab('login'); return false;">Войти</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tabs button');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        function toggleStaffCodeField() {
            const type = document.getElementById('registerType').value;
            const staffCodeGroup = document.getElementById('staffCodeGroup');
            const staffCode = document.getElementById('staffCode');

            if (type === 'staff') {
                staffCodeGroup.style.display = 'block';
                staffCode.required = true;
            } else {
                staffCodeGroup.style.display = 'none';
                staffCode.required = false;
            }
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
