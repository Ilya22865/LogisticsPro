<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#638ECB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Мои заказы - LogisticsPro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========================================
           Orders Page - Enhanced Styles
           ======================================== */

        /* --- Page Header Enhancements --- */
        .page-header {
            position: relative;
        }

        .page-header h1 {
            position: relative;
            display: inline-block;
        }

        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent-warm));
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-header:hover h1::after {
            width: 100%;
        }

        /* --- Filter Card Container --- */
        .filters-card {
            background: var(--color-white);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(99, 142, 203, 0.08);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .filters-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent-warm), var(--color-accent-green));
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .filters-card:hover {
            box-shadow: var(--shadow);
        }

        .filters-wrapper {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filters-wrapper .form-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 180px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .filters-wrapper .form-group.filter-active {
            transform: translateY(-2px);
        }

        /* --- Search Input with Icon --- */
        .search-input-wrapper {
            position: relative;
        }

        .search-input-wrapper .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-primary);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .search-input-wrapper input {
            padding-left: 42px;
            transition: var(--transition-smooth);
        }

        .search-input-wrapper input:focus + .search-icon,
        .search-input-wrapper input:hover + .search-icon {
            color: var(--color-accent-warm);
        }

        .search-input-wrapper .clear-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            padding: 4px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s ease, color 0.2s ease;
            z-index: 1;
        }

        .search-input-wrapper .clear-search.visible {
            opacity: 1;
        }

        .search-input-wrapper .clear-search:hover {
            color: var(--color-accent-warm);
        }

        /* --- New Order Button --- */
        .btn-new-order {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent-warm) 100%);
            color: var(--color-white);
            border: none;
            border-radius: var(--border-radius);
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(99, 142, 203, 0.3);
        }

        .btn-new-order::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }

        .btn-new-order:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(99, 142, 203, 0.4);
        }

        .btn-new-order:hover::before {
            left: 100%;
        }

        .btn-new-order:active {
            transform: translateY(-1px);
        }

        .btn-new-order i {
            transition: transform 0.3s ease;
        }

        .btn-new-order:hover i {
            transform: rotate(90deg);
        }

        /* --- Table Header Enhancement --- */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--color-bg-light);
            position: relative;
        }

        .table-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent-warm));
            border-radius: 1px;
        }

        .table-header h2 {
            font-size: 20px;
            color: var(--color-dark);
            margin: 0;
            padding: 0;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-header h2::before {
            content: '\f0f6';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--color-primary);
            font-size: 18px;
        }

        .order-count-badge {
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: var(--color-white);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* --- Table Styling --- */
        .orders-table-card {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table-card thead tr {
            background: linear-gradient(135deg, var(--color-bg-light) 0%, var(--color-bg-secondary) 100%);
        }

        .orders-table-card th {
            font-weight: 700;
            color: var(--color-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 16px 15px;
            position: relative;
            white-space: nowrap;
        }

        .orders-table-card th:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 25%;
            height: 50%;
            width: 1px;
            background: var(--color-bg-secondary);
        }

        .orders-table-card td {
            padding: 16px 15px;
            font-size: 14px;
            vertical-align: middle;
            border-bottom: 1px solid rgba(213, 222, 239, 0.5);
            transition: background 0.25s ease;
        }

        .orders-table-card tbody tr {
            transition: background 0.25s ease, box-shadow 0.25s ease;
            position: relative;
        }

        .orders-table-card tbody tr::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--color-primary);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .orders-table-card tbody tr:hover {
            background: linear-gradient(90deg, rgba(99, 142, 203, 0.06) 0%, rgba(240, 243, 250, 0.3) 100%);
            box-shadow: 0 2px 8px rgba(99, 142, 203, 0.08);
        }

        .orders-table-card tbody tr:hover::before {
            opacity: 1;
        }

        .orders-table-card tbody tr:last-child td {
            border-bottom: none;
        }

        /* --- Status Badges with Pulsing Dots --- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .status-badge.pending {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            color: #f57c00;
        }

        .status-badge.in-transit {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1976d2;
        }

        .status-badge.delivered {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #388e3c;
        }

        .status-badge.cancelled {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #d32f2f;
        }

        /* --- Order Number Styling --- */
        .order-number {
            font-weight: 700;
            color: var(--color-dark);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }

        /* --- Action Buttons in Table --- */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--color-bg-light);
            color: var(--color-primary);
            font-size: 14px;
            margin: 0 2px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        .action-btn.view-btn:hover {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .action-btn.track-btn:hover {
            background: var(--color-accent-green);
            color: var(--color-white);
        }

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-content {
            max-width: 400px;
            margin: 0 auto;
        }

        .empty-state-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--color-bg-light) 0%, var(--color-bg-secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .empty-state-icon i {
            font-size: 48px;
            color: var(--color-primary);
            opacity: 0.5;
        }

        .empty-state-icon::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 8px;
            background: var(--color-bg-secondary);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--color-dark);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--color-primary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* --- Loading Skeleton --- */
        .skeleton-row td {
            padding: 16px 15px;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--color-bg-light) 25%, var(--color-bg-secondary) 50%, var(--color-bg-light) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            height: 16px;
        }

        .skeleton.short { width: 80px; }
        .skeleton.medium { width: 150px; }
        .skeleton.long { width: 250px; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- Pagination --- */
        .pagination-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .pagination-info {
            color: var(--color-primary);
            margin: 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pagination-info .highlight {
            font-weight: 700;
            color: var(--color-dark);
        }

        .pagination-controls {
            display: flex;
            gap: 10px;
        }

        .pagination-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: var(--color-white);
            color: var(--color-dark);
            border: 2px solid var(--color-bg-secondary);
            min-width: 110px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: var(--color-primary);
            color: var(--color-white);
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: var(--color-bg-light);
        }

        .pagination-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        /* --- Toast Notifications --- */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--color-white);
            border-radius: var(--border-radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-strong);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            animation: toastSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid var(--color-primary);
            position: relative;
            overflow: hidden;
        }

        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--color-primary);
            animation: toastTimer 5s linear forwards;
        }

        .toast.toast-success { border-left-color: var(--color-accent-green); }
        .toast.toast-success::after { background: var(--color-accent-green); }
        .toast.toast-error { border-left-color: var(--color-danger); }
        .toast.toast-error::after { background: var(--color-danger); }
        .toast.toast-warning { border-left-color: var(--color-warning); }
        .toast.toast-warning::after { background: var(--color-warning); }

        @keyframes toastSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastSlideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @keyframes toastTimer {
            from { width: 100%; }
            to { width: 0%; }
        }

        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .toast-success .toast-icon { color: var(--color-accent-green); }
        .toast-error .toast-icon { color: var(--color-danger); }
        .toast-warning .toast-icon { color: var(--color-warning); }
        .toast-info .toast-icon { color: var(--color-info); }

        .toast-content {
            flex: 1;
            font-size: 14px;
            color: var(--color-dark);
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .toast-close:hover {
            opacity: 1;
        }

        /* ========================================
           MOBILE RESPONSIVENESS
           ======================================== */

        /* --- Tablet (769-1024px) --- */
        @media (min-width: 769px) and (max-width: 1024px) {
            .filters-wrapper .form-group {
                min-width: 150px;
            }

            .orders-table-card th,
            .orders-table-card td {
                padding: 14px 12px;
                font-size: 13px;
            }
        }

        /* --- Mobile (<768px) --- */
        @media (max-width: 768px) {
            /* Filter card adjustments */
            .filters-card {
                padding: 16px;
            }

            .filters-wrapper {
                flex-direction: column;
                gap: 12px;
            }

            .filters-wrapper .form-group {
                min-width: 100% !important;
                flex: none;
            }

            .filters-wrapper .form-group label {
                font-size: 13px;
                margin-bottom: 6px;
            }

            .filters-wrapper .form-group select,
            .filters-wrapper .form-group input {
                min-height: 48px;
                font-size: 16px; /* Prevents iOS zoom on focus */
            }

            /* New order button - full width */
            .btn-new-order {
                width: 100%;
                justify-content: center;
                padding: 16px 24px;
                min-height: 48px;
                margin-top: 0;
                max-width: none;
            }

            /* Table card view */
            .orders-table-card tbody tr {
                display: block;
                margin-bottom: 16px;
                border: 1px solid rgba(99, 142, 203, 0.12);
                border-radius: var(--border-radius-lg);
                padding: 16px;
                background: var(--color-white);
                box-shadow: var(--shadow-soft);
                transition: box-shadow 0.3s ease, transform 0.2s ease;
                position: relative;
                overflow: hidden;
            }

            .orders-table-card tbody tr::before {
                width: 100%;
                height: 3px;
                top: 0;
                bottom: auto;
                background: linear-gradient(90deg, var(--color-primary), var(--color-accent-warm));
                opacity: 1;
            }

            .orders-table-card tbody tr:hover {
                box-shadow: var(--shadow);
                transform: translateY(-2px);
            }

            .orders-table-card thead {
                display: none;
            }

            .orders-table-card td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 0;
                border: none;
                border-bottom: 1px solid var(--color-bg-light);
                font-size: 14px;
                min-height: 44px;
            }

            .orders-table-card td:last-child {
                border-bottom: none;
            }

            .orders-table-card td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--color-dark);
                margin-right: 16px;
                flex-shrink: 0;
                min-width: 120px;
                font-size: 13px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .orders-table-card td::before i {
                color: var(--color-primary);
                width: 16px;
                text-align: center;
            }

            .orders-table-card .status-badge {
                margin-left: auto;
            }

            /* Action buttons in mobile cards */
            .mobile-actions {
                display: flex;
                gap: 8px;
                margin-top: 12px;
                padding-top: 12px;
                border-top: 1px solid var(--color-bg-light);
            }

            .mobile-actions .action-btn {
                flex: 1;
                min-height: 48px;
                border-radius: var(--border-radius);
                font-size: 13px;
                gap: 6px;
            }

            .mobile-actions .action-btn span {
                display: inline;
            }

            /* Empty state mobile */
            .empty-state {
                padding: 40px 16px;
            }

            .empty-state-icon {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }

            .empty-state-icon i {
                font-size: 40px;
            }

            .empty-state h3 {
                font-size: 18px;
            }

            .empty-state .btn-new-order {
                width: 100%;
            }

            /* Pagination mobile */
            .pagination-wrapper {
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }

            .pagination-info {
                text-align: center;
                width: 100%;
            }

            .pagination-controls {
                width: 100%;
                gap: 12px;
            }

            .pagination-btn {
                flex: 1;
                min-width: 0;
                min-height: 48px;
                padding: 12px 16px;
            }

            /* Table header */
            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .table-header h2 {
                font-size: 18px;
            }

            /* Skeleton loading mobile */
            .skeleton {
                height: 14px;
            }
        }

        /* --- Small phones (<480px) --- */
        @media (max-width: 480px) {
            .filters-card {
                padding: 12px;
            }

            .orders-table-card td {
                font-size: 13px;
                padding: 8px 0;
            }

            .orders-table-card td::before {
                min-width: 100px;
                font-size: 12px;
            }

            .orders-table-card tbody tr {
                padding: 12px;
                margin-bottom: 12px;
            }

            .empty-state {
                padding: 30px 12px;
            }

            .empty-state-icon {
                width: 80px;
                height: 80px;
            }

            .empty-state-icon i {
                font-size: 32px;
            }

            .empty-state h3 {
                font-size: 16px;
            }

            .empty-state p {
                font-size: 13px;
            }

            .toast {
                min-width: auto;
                max-width: calc(100vw - 40px);
            }

            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
            }
        }

        /* --- Landscape mobile --- */
        @media (max-height: 500px) and (orientation: landscape) and (max-width: 768px) {
            .filters-wrapper {
                display: none;
            }

            .orders-table-card td {
                padding: 6px 0;
                min-height: 36px;
            }
        }

        /* --- Micro-interactions --- */
        @media (prefers-reduced-motion: no-preference) {
            .orders-table-card tbody tr {
                animation: rowFadeIn 0.4s ease forwards;
                opacity: 0;
            }

            @keyframes rowFadeIn {
                from { opacity: 0; transform: translateX(-10px); }
                to { opacity: 1; transform: translateX(0); }
            }

            .orders-table-card tbody tr:nth-child(1) { animation-delay: 0.05s; }
            .orders-table-card tbody tr:nth-child(2) { animation-delay: 0.1s; }
            .orders-table-card tbody tr:nth-child(3) { animation-delay: 0.15s; }
            .orders-table-card tbody tr:nth-child(4) { animation-delay: 0.2s; }
            .orders-table-card tbody tr:nth-child(5) { animation-delay: 0.25s; }
            .orders-table-card tbody tr:nth-child(6) { animation-delay: 0.3s; }
            .orders-table-card tbody tr:nth-child(7) { animation-delay: 0.35s; }
            .orders-table-card tbody tr:nth-child(8) { animation-delay: 0.4s; }
            .orders-table-card tbody tr:nth-child(9) { animation-delay: 0.45s; }
            .orders-table-card tbody tr:nth-child(10) { animation-delay: 0.5s; }
        }

        /* Filter change animation */
        .filters-changing .orders-table-card tbody tr {
            animation: filterPulse 0.4s ease;
        }

        @keyframes filterPulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Кнопка меню для мобильных -->
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Меню">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>LogisticsPro</h2>
            <span class="role-badge">Клиент</span>
        </div>

        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="icon-dashboard"></i> Дашборд</a></li>
            <li><a href="orders.html" class="active"><i class="icon-box"></i> Мои заказы</a></li>
            <li><a href="settings.html"><i class="icon-settings"></i> Настройки</a></li>
        </ul>

        <div class="sidebar-user">
            <div class="user-info">
                <div class="avatar" id="userAvatar"></div>
                <div class="user-details">
                    <h4 id="userName"></h4>
                    <p id="userCompany"></p>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="icon-logout"></i> Выйти
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Мои заказы</h1>
            <p>Управление и отслеживание всех ваших заказов</p>
        </div>

        <div id="alertContainer"></div>

        <!-- Enhanced Filter Card -->
        <div class="filters-card fade-in" style="margin-bottom: 30px;">
            <div class="filters-wrapper">
                <div class="form-group" id="statusFilterGroup">
                    <label for="statusFilter"><i class="fas fa-filter"></i> Статус</label>
                    <select id="statusFilter" onchange="onFilterChange()">
                        <option value="">Все статусы</option>
                        <option value="pending">Ожидание</option>
                        <option value="in-transit">В пути</option>
                        <option value="delivered">Доставлен</option>
                        <option value="cancelled">Отменён</option>
                    </select>
                </div>

                <div class="form-group" id="dateFilterGroup">
                    <label for="dateFilter"><i class="fas fa-calendar-alt"></i> Период</label>
                    <select id="dateFilter" onchange="onFilterChange()">
                        <option value="all">За всё время</option>
                        <option value="week">За неделю</option>
                        <option value="month">За месяц</option>
                        <option value="year">За год</option>
                    </select>
                </div>

                <div class="form-group" id="searchFilterGroup" style="flex: 2;">
                    <label for="searchOrder"><i class="fas fa-search"></i> Поиск</label>
                    <div class="search-input-wrapper">
                        <input type="text" id="searchOrder" placeholder="№ заказа или маршрут..." oninput="onSearchInput()">
                        <i class="fas fa-search search-icon"></i>
                        <button class="clear-search" id="clearSearchBtn" onclick="clearSearch()" aria-label="Очистить поиск">
                            <i class="fas fa-times-circle"></i>
                        </button>
                    </div>
                </div>

                <button class="btn-new-order full-width-mobile" onclick="createNewOrder()">
                    <i class="fas fa-plus-circle"></i> Новый заказ
                </button>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="table-container fade-in">
            <div class="table-header">
                <h2>Все заказы <span class="order-count-badge" id="orderCountBadge" style="display: none;">0</span></h2>
            </div>
            <div style="overflow-x: auto;">
                <table id="ordersTable" class="orders-table-card">
                    <thead>
                        <tr>
                            <th>№ заказа</th>
                            <th>Маршрут</th>
                            <th>Груз</th>
                            <th>Статус</th>
                            <th>Дата создания</th>
                            <th>Дата доставки</th>
                            <th>Стоимость</th>
                            <th class="hide-mobile">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="loading-row">
                            <td colspan="8">Загрузка данных...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="table-container fade-in" style="margin-top: 20px;">
            <div class="pagination-wrapper">
                <p class="pagination-info">
                    <i class="fas fa-list-ol"></i>
                    Показано <span class="highlight" id="showingCount">0</span> из <span class="highlight" id="totalCount">0</span> заказов
                </p>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prevBtn" disabled onclick="goToPrevPage()">
                        <i class="fas fa-chevron-left"></i> Назад
                    </button>
                    <button class="pagination-btn" id="nextBtn" onclick="goToNextPage()">
                        Вперёд <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script>
        const API_BASE_URL = '/api';
        let currentPage = 1;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadOrders(), 500);
        }

        function onSearchInput() {
            const searchInput = document.getElementById('searchOrder');
            const clearBtn = document.getElementById('clearSearchBtn');

            // Show/hide clear button
            if (clearBtn) {
                clearBtn.classList.toggle('visible', searchInput.value.length > 0);
            }

            debounceSearch();
        }

        function clearSearch() {
            document.getElementById('searchOrder').value = '';
            document.getElementById('clearSearchBtn').classList.remove('visible');
            loadOrders();
        }

        function onFilterChange() {
            // Add visual feedback
            const tableContainer = document.querySelector('.table-container');
            if (tableContainer) {
                tableContainer.classList.add('filters-changing');
                setTimeout(() => tableContainer.classList.remove('filters-changing'), 400);
            }

            // Highlight active filters
            document.querySelectorAll('.filters-wrapper .form-group').forEach(group => {
                group.classList.remove('filter-active');
            });

            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            if (statusFilter) {
                document.getElementById('statusFilterGroup').classList.add('filter-active');
            }
            if (dateFilter !== 'all') {
                document.getElementById('dateFilterGroup').classList.add('filter-active');
            }

            loadOrders();
        }

        function getDateRange() {
            const dateFilter = document.getElementById('dateFilter').value;
            const now = new Date();
            let dateFrom = null;

            switch (dateFilter) {
                case 'week':
                    dateFrom = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    break;
                case 'month':
                    dateFrom = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                    break;
                case 'year':
                    dateFrom = new Date(now.getTime() - 365 * 24 * 60 * 60 * 1000);
                    break;
                default:
                    return { from: null, to: null };
            }

            return { from: dateFrom.toISOString(), to: now.toISOString() };
        }

        function showSkeletonLoading() {
            const tbody = document.querySelector('#ordersTable tbody');
            let skeletonRows = '';
            for (let i = 0; i < 5; i++) {
                skeletonRows += `
                    <tr class="skeleton-row">
                        <td><div class="skeleton short"></div></td>
                        <td><div class="skeleton medium"></div></td>
                        <td><div class="skeleton long"></div></td>
                        <td><div class="skeleton short"></div></td>
                        <td><div class="skeleton medium"></div></td>
                        <td><div class="skeleton medium"></div></td>
                        <td><div class="skeleton short"></div></td>
                        <td class="hide-mobile"><div class="skeleton short"></div></td>
                    </tr>
                `;
            }
            tbody.innerHTML = skeletonRows;
        }

        async function loadOrders() {
            showSkeletonLoading();

            const statusFilter = document.getElementById('statusFilter').value;
            const searchQuery = document.getElementById('searchOrder').value.trim();
            const dateRange = getDateRange();

            const params = new URLSearchParams({
                page: currentPage.toString(),
                pageSize: '10'
            });

            if (statusFilter) params.append('status', statusFilter);
            if (searchQuery) params.append('search', searchQuery);
            if (dateRange.from) params.append('dateFrom', dateRange.from);
            if (dateRange.to) params.append('dateTo', dateRange.to);

            try {
                const response = await fetch(`${API_BASE_URL}/orders?${params}`);

                if (!response.ok) {
                    throw new Error('Ошибка загрузки данных');
                }

                const data = await response.json();
                const orders = data.items || data;
                const totalCount = data.totalCount || data.length;

                renderOrders(orders, totalCount, data);
            } catch (error) {
                console.error('Ошибка:', error);
                const tbody = document.querySelector('#ordersTable tbody');
                tbody.innerHTML = `
                    <tr class="empty-state">
                        <td colspan="8">
                            <div class="empty-state-content">
                                <div class="empty-state-icon">
                                    <i class="fas fa-exclamation-triangle"></i>
                                </div>
                                <h3>Ошибка загрузки</h3>
                                <p>Не удалось загрузить данные. Попробуйте обновить страницу или обратитесь в поддержку.</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        function renderOrders(orders, totalCount, data) {
            const tbody = document.querySelector('#ordersTable tbody');

            // Update count badge
            const badge = document.getElementById('orderCountBadge');
            if (badge) {
                badge.textContent = totalCount;
                badge.style.display = totalCount > 0 ? 'inline-block' : 'none';
            }

            if (orders.length === 0) {
                const searchQuery = document.getElementById('searchOrder').value.trim();
                const statusFilter = document.getElementById('statusFilter').value;

                let message = 'У вас пока нет заказов';
                let subMessage = 'Создайте свой первый заказ, чтобы начать работу с логистикой';

                if (searchQuery || statusFilter) {
                    message = 'Заказы не найдены';
                    subMessage = 'Попробуйте изменить параметры поиска или фильтры';
                }

                tbody.innerHTML = `
                    <tr class="empty-state">
                        <td colspan="8">
                            <div class="empty-state-content">
                                <div class="empty-state-icon">
                                    <i class="fas fa-inbox"></i>
                                </div>
                                <h3>${message}</h3>
                                <p>${subMessage}</p>
                                ${!searchQuery && !statusFilter ? `
                                    <button class="btn-new-order" onclick="createNewOrder()" style="display: inline-flex;">
                                        <i class="fas fa-plus-circle"></i> Создать первый заказ
                                    </button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            } else {
                const isMobile = window.innerWidth <= 768;

                tbody.innerHTML = orders.map(order => `
                    <tr data-status="${order.status?.toLowerCase() || 'pending'}">
                        <td data-label="<i class='fas fa-hashtag'></i> № заказа"><span class="order-number">#${order.id.toString().padStart(6, '0')}</span></td>
                        <td data-label="<i class='fas fa-route'></i> Маршрут">${order.startLocation || '—'} → ${order.endLocation || '—'}</td>
                        <td data-label="<i class='fas fa-box'></i> Груз">${order.cargoDescription || '—'}${order.weight ? ` (${order.weight} кг)` : ''}</td>
                        <td data-label="<i class='fas fa-circle-notch'></i> Статус"><span class="status-badge ${getStatusClass(order.status)}">${getStatusText(order.status)}</span></td>
                        <td data-label="<i class='fas fa-calendar-plus'></i> Создан">${formatDate(order.createdDate)}</td>
                        <td data-label="<i class='fas fa-calendar-check'></i> Доставка">${order.deliveryDate ? formatDate(order.deliveryDate) : '—'}</td>
                        <td data-label="<i class='fas fa-ruble-sign'></i> Стоимость"><strong>${formatCost(order.cost)}</strong></td>
                        <td data-label="Действия" class="${isMobile ? '' : 'hide-mobile'}">
                            ${isMobile ? `
                                <div class="mobile-actions">
                                    <button class="action-btn view-btn" onclick="viewOrder(${order.id})" title="Просмотр">
                                        <i class="fas fa-eye"></i> <span>Просмотр</span>
                                    </button>
                                    <button class="action-btn track-btn" onclick="trackOrder(${order.id})" title="Отследить">
                                        <i class="fas fa-map-marker-alt"></i> <span>Отследить</span>
                                    </button>
                                </div>
                            ` : `
                                <button class="action-btn view-btn" onclick="viewOrder(${order.id})" title="Просмотр">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn track-btn" onclick="trackOrder(${order.id})" title="Отследить">
                                    <i class="fas fa-map-marker-alt"></i>
                                </button>
                            `}
                        </td>
                    </tr>
                `).join('');
            }

            document.getElementById('showingCount').textContent = orders.length;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= (data.totalPages || 1);
        }

        function getStatusClass(status) {
            const statusMap = {
                'pending': 'pending',
                'in-transit': 'in-transit',
                'delivered': 'delivered',
                'cancelled': 'cancelled'
            };
            return statusMap[status?.toLowerCase()] || 'pending';
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': 'Ожидание',
                'in-transit': 'В пути',
                'delivered': 'Доставлен',
                'cancelled': 'Отменён'
            };
            return statusMap[status?.toLowerCase()] || 'Неизвестно';
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatCost(cost) {
            if (!cost && cost !== 0) return '—';
            return new Intl.NumberFormat('ru-RU').format(Math.round(cost)) + ' ₽';
        }

        function createNewOrder() {
            window.location.href = 'create-order.html';
        }

        function viewOrder(orderId) {
            showToast('Просмотр заказа #' + orderId, 'info');
        }

        function trackOrder(orderId) {
            window.location.href = 'cargo-map.html?order=' + orderId;
        }

        function goToPrevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadOrders();
            }
        }

        function goToNextPage() {
            currentPage++;
            loadOrders();
        }

        // Pagination button listeners (legacy support)
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                loadOrders();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentPage++;
            loadOrders();
        });

        // Toast notification system
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const icons = {
                'info': 'fas fa-info-circle',
                'success': 'fas fa-check-circle',
                'warning': 'fas fa-exclamation-circle',
                'error': 'fas fa-times-circle'
            };

            toast.innerHTML = `
                <i class="toast-icon ${icons[type] || icons['info']}"></i>
                <div class="toast-content">${message}</div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;

            container.appendChild(toast);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.animation = 'toastSlideOut 0.4s ease forwards';
                    setTimeout(() => toast.remove(), 400);
                }
            }, 5000);
        }

        // Legacy alert function (backward compatibility)
        function showAlert(message, type = 'info') {
            showToast(message, type);
        }

        // Переключение бокового меню на мобильных
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const menuToggle = document.querySelector('.menu-toggle');

            if (sidebar) {
                sidebar.classList.toggle('active');
            }

            if (menuToggle) {
                menuToggle.classList.toggle('active');
            }

            let overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.remove();
            } else {
                const newOverlay = document.createElement('div');
                newOverlay.id = 'sidebarOverlay';
                newOverlay.className = 'sidebar-overlay';
                newOverlay.onclick = toggleSidebar;
                document.body.appendChild(newOverlay);
            }
        }

        // Закрытие меню при клике на ссылку (для мобильных)
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });

        // Handle window resize for mobile/desktop view switching
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                // Re-render orders to switch between mobile card view and desktop table
                const tbody = document.querySelector('#ordersTable tbody');
                if (tbody && tbody.querySelector('tr')) {
                    const isMobile = window.innerWidth <= 768;
                    const actionsCells = tbody.querySelectorAll('tr td:last-child');
                    actionsCells.forEach(cell => {
                        if (isMobile) {
                            cell.classList.remove('hide-mobile');
                            if (!cell.querySelector('.mobile-actions')) {
                                // Re-render needed for mobile layout
                                loadOrders();
                            }
                        } else {
                            cell.classList.add('hide-mobile');
                        }
                    });
                }
            }, 250);
        });
    </script>
</body>
</html>
